data:
  root: ./data/LEVIR-CD
  patch_size: 256
  batch_size: 8
  num_workers: 2          # Colab-safe; TorchGeo suggests ≤2 on free tier
  download: false         # set to true on first run to auto-download LEVIR-CD

model:
  in_channels: 5          # 3 optical (RGB) + 2 SAR channels (VV/VH)
  num_features: 4         # Buildings, Roads, Vegetation, Infrastructure
  feature_dim: 128        # embedding dimension for CSN
  r_max: 10               # ratio clipping for DII
  epsilon: 1.0e-6
  pretrained: false

training:
  max_epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-5
  margin: 1.0             # contrastive loss margin
  scheduler: cosine
  patience: 10            # early stopping patience
  fast_dev_run: false

explainability:
  num_background_samples: 50
  feature_names:
    - Buildings
    - Roads
    - Vegetation
    - Infrastructure

output:
  dir: ./outputs
  log_dir: ./outputs/logs
